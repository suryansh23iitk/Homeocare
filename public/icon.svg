<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background circular gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#064e3b" />
    </radialGradient>
    
    <!-- Drop shadow for the cross -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#022c22" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Circular background -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" />

  <!-- Outer clinic border ring -->
  <circle cx="256" cy="256" r="224" fill="none" stroke="#a7f3d0" stroke-width="6" stroke-dasharray="8 8" opacity="0.3" />

  <g filter="url(#shadow)">
    <!-- White Medical Cross -->
    <path d="M 224,120 H 288 V 224 H 392 V 288 H 288 V 392 H 224 V 288 H 120 V 224 H 224 Z" fill="#ffffff" />
    
    <!-- Homeopathic Leaf details wrapping the cross -->
    <path d="M 288,224 C 288,180 340,160 360,140 C 340,180 300,210 288,224 Z" fill="#6ee7b7" />
    <path d="M 288,224 C 320,224 350,250 370,280 C 330,280 300,240 288,224 Z" fill="#34d399" />
  </g>

  <!-- Stylized H inside the center of cross -->
  <text x="256" y="270" font-family="system-ui, sans-serif" font-size="42" font-weight="900" fill="#047857" text-anchor="middle" opacity="0.9">H</text>
</svg>
